  <rect x="435" y="410" width="410" height="74" fill="#F0FDF4" stroke="#6EE7B7" stroke-width="2"/>
  <text x="640" y="442" text-anchor="middle" class="boxTitle">Runtime Factory</text>
  <text x="640" y="466" text-anchor="middle" class="boxText">依赖装配 / 请求级配置覆盖</text>

  <rect x="120" y="520" width="190" height="70" fill="#F0FDF4" stroke="#6EE7B7" stroke-width="2"/>
