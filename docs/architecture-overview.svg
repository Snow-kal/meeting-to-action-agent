  <text x="495" y="574" text-anchor="middle" class="boxText">规则抽取 + 模型增强</text>

  <rect x="680" y="520" width="220" height="70" fill="#F0FDF4" stroke="#6EE7B7" stroke-width="2"/>
  <text x="790" y="550" text-anchor="middle" class="boxTitle">Due Parser</text>
  <text x="790" y="574" text-anchor="middle" class="boxText">绝对 / 相对时间解析</text>

  <rect x="985" y="520" width="190" height="70" fill="#F0FDF4" stroke="#6EE7B7" stroke-width="2"/>
