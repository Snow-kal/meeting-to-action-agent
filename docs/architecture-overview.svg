  <rect x="340" y="155" width="220" height="78" fill="#F8FAFC" stroke="#60A5FA" stroke-width="2"/>
  <text x="450" y="190" text-anchor="middle" class="boxTitle">Web UI</text>
  <text x="450" y="214" text-anchor="middle" class="boxText">index.html / app.js</text>

  <rect x="340" y="255" width="170" height="78" fill="#F8FAFC" stroke="#60A5FA" stroke-width="2"/>
  <text x="425" y="288" text-anchor="middle" class="boxTitle">HTTP API</text>
  <text x="425" y="312" text-anchor="middle" class="boxText">POST /run</text>

  <rect x="610" y="255" width="240" height="78" fill="#F8FAFC" stroke="#60A5FA" stroke-width="2"/>
  <text x="730" y="288" text-anchor="middle" class="boxTitle">CLI</text>
  <text x="730" y="312" text-anchor="middle" class="boxText">cmd/meeting-to-action</text>

  <path d="M450 233V255" stroke="#E5E7EB" stroke-width="2" marker-end="url(#arrow)"/>

  <rect x="60" y="360" width="1160" height="210" fill="#4B4B4B" stroke="#71717A" stroke-width="2"/>
