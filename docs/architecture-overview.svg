  <path d="M485 827C525 827 545 744 545 727" stroke="#E5E7EB" stroke-width="2" marker-end="url(#arrow)"/>

  <rect x="1010" y="615" width="210" height="295" fill="#4B4B4B" stroke="#71717A" stroke-width="2"/>
