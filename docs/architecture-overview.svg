<svg width="1280" height="980" viewBox="0 0 1280 980" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .title { font: 700 30px "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif; fill: #F8FAFC; }
      .layer { font: 700 20px "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif; fill: #F8FAFC; }
      .boxTitle { font: 700 17px "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif; fill: #1E3A8A; }
      .boxText { font: 500 14px "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif; fill: #1E3A8A; }
      .small { font: 500 13px "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif; fill: #CBD5E1; }
    </style>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0L10 5L0 10V0Z" fill="#E5E7EB"/>
    </marker>
  </defs>

  <rect width="1280" height="980" fill="#18181B"/>
  <text x="60" y="58" class="title">meeting-to-action-agent</text>
  <text x="60" y="86" class="small">会议记录 → 决策提取 → 任务拆解 → 负责人识别 → 截止时间补全 → Jira / Notion 同步</text>

  <rect x="300" y="110" width="680" height="180" fill="#4B4B4B" stroke="#71717A" stroke-width="2"/>
