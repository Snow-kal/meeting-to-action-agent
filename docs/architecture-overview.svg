  <rect x="545" y="790" width="250" height="74" fill="#FFF7ED" stroke="#FB923C" stroke-width="2"/>
  <text x="670" y="820" text-anchor="middle" class="boxTitle">Owner + Deadline Agent</text>
  <text x="670" y="844" text-anchor="middle" class="boxText">负责人识别 / 截止时间补全</text>

  <path d="M310 590V690" stroke="#E5E7EB" stroke-width="2" marker-end="url(#arrow)"/>
  <path d="M495 590V650C495 670 670 670 670 690" stroke="#E5E7EB" stroke-width="2" stroke-dasharray="5 5" marker-end="url(#arrow)"/>
  <path d="M790 590V790" stroke="#E5E7EB" stroke-width="2" marker-end="url(#arrow)"/>
  <path d="M360 764V790" stroke="#E5E7EB" stroke-width="2" marker-end="url(#arrow)"/>
