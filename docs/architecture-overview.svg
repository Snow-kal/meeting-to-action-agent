  <path d="M1105 764V790" stroke="#E5E7EB" stroke-width="2" marker-end="url(#arrow)"/>

  <rect x="885" y="930" width="160" height="36" fill="#F5F3FF" stroke="#A78BFA" stroke-width="2"/>
  <text x="965" y="953" text-anchor="middle" class="boxText">Jira</text>
  <rect x="1085" y="930" width="160" height="36" fill="#F5F3FF" stroke="#A78BFA" stroke-width="2"/>
  <text x="1165" y="953" text-anchor="middle" class="boxText">Notion</text>
  <path d="M1115 864V900H965V930" stroke="#E5E7EB" stroke-width="2" marker-end="url(#arrow)"/>
  <path d="M1115 864V930H1165" stroke="#E5E7EB" stroke-width="2" marker-end="url(#arrow)"/>
