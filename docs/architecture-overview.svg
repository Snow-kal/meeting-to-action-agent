  <rect x="1045" y="690" width="140" height="74" fill="#EFF6FF" stroke="#60A5FA" stroke-width="2"/>
  <text x="1115" y="720" text-anchor="middle" class="boxTitle">Result JSON</text>
  <text x="1115" y="744" text-anchor="middle" class="boxText">summary / tasks</text>

  <rect x="1045" y="790" width="140" height="74" fill="#EFF6FF" stroke="#60A5FA" stroke-width="2"/>
  <text x="1115" y="820" text-anchor="middle" class="boxTitle">Report</text>
  <text x="1115" y="844" text-anchor="middle" class="boxText">Markdown</text>

